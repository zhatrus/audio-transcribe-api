name: ${SERVICE_NAME:-audio-transcribe-api}
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - models:/home/app/.cache/huggingface
      - ./app:/home/app/app
      - /tmp/audio-transcribe-api:/tmp/audio-transcribe-api
    environment:
      - DEVICE=gpu
      - COMPUTE_TYPE=float16
      - MODEL_SIZE=${MODEL_SIZE:-medium}
      - HF_TOKEN=${HF_TOKEN}
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=1
      - LOG_LEVEL=info
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  models:
